name: Storyfy
options:
  bundleIdPrefix: br.com.thalesvinkler
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
targets:
  Storyfy:
    type: application
    platform: iOS
    sources:
      - Storyfy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: br.com.thalesvinkler.storyfy
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Storyfy
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: O Storyfy usa suas fotos para criar sua retrospectiva mensal no próprio iPhone.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: O Storyfy cria um álbum com as fotos que você aprovou.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    scheme:
      testTargets:
        - StoryfyTests
  StoryfyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - StoryfyTests
    dependencies:
      - target: Storyfy
